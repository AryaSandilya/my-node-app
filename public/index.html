<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Node App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 48px 56px;
      text-align: center;
      max-width: 480px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }
    .badge {
      display: inline-block;
      background: #22c55e20;
      color: #22c55e;
      border: 1px solid #22c55e40;
      border-radius: 999px;
      padding: 4px 14px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    h1 { font-size: 2rem; font-weight: 700; margin-bottom: 12px; }
    p { color: #94a3b8; line-height: 1.6; margin-bottom: 32px; }
    .meta {
      background: #0f172a;
      border-radius: 10px;
      padding: 16px 20px;
      text-align: left;
      font-size: 13px;
    }
    .meta div { display: flex; justify-content: space-between; padding: 4px 0; }
    .meta span:first-child { color: #64748b; }
    .meta span:last-child { color: #38bdf8; font-weight: 500; }
    .version { margin-top: 24px; font-size: 12px; color: #475569; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">● Live</div>
    <h1>Hello from Node.js!</h1>
    <p>Your static web server is running fine. Edit <code>public/index.html</code> and commit to trigger a Jenkins build.</p>
    <div class="meta">
      <div><span>Environment</span><span id="env">production</span></div>
      <div><span>Loaded at</span><span id="time"></span></div>
      <div><span>Build</span><span id="build">v1.0.0</span></div>
    </div>
    <div class="version">Deployed via Jenkins CI/CD</div>
  </div>

  <script>
    document.getElementById('time').textContent = new Date().toLocaleTimeString();
  </script>
</body>
</html>
